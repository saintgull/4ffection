<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>4ffection - tour dates</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      background: #000;
      color: #fff;
      min-height: 100vh;
      font-family: 'Cormorant Garamond', serif;
      background-image: url('website%20wallpaper%20retouches.jpg');
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      background-attachment: fixed;
      cursor: url('butterfly-closed.png') 24 38, default;
    }

    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    a, button {
      cursor: url('butterfly-open.png') 24 24, pointer;
    }

    header {
      padding: 4vh 4vw;
    }

    .header-logo {
      height: clamp(30px, 5vh, 60px);
      width: auto;
    }

    .content {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 4vh 4vw;
    }

    .page-title {
      font-weight: 300;
      font-size: clamp(1.4rem, 3vw, 2.5rem);
      letter-spacing: 0.2em;
      text-transform: lowercase;
      color: rgba(255, 255, 255, 0.7);
      margin-bottom: 3vh;
    }

    .tour-list {
      list-style: none;
      text-align: center;
    }

    .tour-list li {
      font-weight: 300;
      font-size: clamp(0.9rem, 1.5vw, 1.1rem);
      color: rgba(255, 255, 255, 0.6);
      letter-spacing: 0.08em;
      margin-bottom: 1.2em;
    }

    .tour-list .venue {
      color: rgba(255, 255, 255, 0.8);
    }

    .tour-list .date {
      font-size: 0.85em;
      color: rgba(255, 255, 255, 0.4);
    }

    .tour-list .tba {
      color: rgba(255, 255, 255, 0.5);
      font-style: italic;
    }

    footer {
      display: flex;
      justify-content: center;
      gap: clamp(20px, 4vw, 48px);
      padding: 2vh 4vw;
      flex-shrink: 0;
    }

    footer a {
      color: rgba(255, 255, 255, 0.5);
      text-decoration: none;
      font-size: clamp(0.75rem, 1vw, 0.95rem);
      font-weight: 400;
      letter-spacing: 0.12em;
      text-transform: lowercase;
      transition: color 0.3s ease;
    }

    footer a:hover {
      color: #fff;
    }
  </style>
</head>
<body>

  <header>
    <a href="index.html"><img class="header-logo" src="header-logo.png" alt="4ffection"></a>
  </header>

  <div class="content">
    <h1 class="page-title">tour dates</h1>
    <ul class="tour-list">
      <li>
        <span class="venue">La Boule Noire, Paris</span><br>
        <span class="date">01/09/2022</span>
      </li>
      <li>
        <span class="venue">Le Chinois, Paris</span><br>
        <span class="date">02/03/2023</span>
      </li>
      <li class="tba">
        TBA, Paris
      </li>
    </ul>
  </div>

  <footer>
    <a href="index.html">home</a>
    <a href="mailto:mgmt@4ffection.baby">booking</a>
  </footer>

</body>
</html>
