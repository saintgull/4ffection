<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>4ffection</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      background: #000;
      color: #fff;
      height: 100vh;
      overflow: hidden;
      font-family: 'Cormorant Garamond', serif;
      background-image: url('website%20wallpaper%20retouches.jpg');
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      background-attachment: fixed;
      cursor: url('butterfly-closed.png') 24 38, default;
    }

    body {
      display: flex;
      flex-direction: column;
      height: 100vh;
    }

    a, button, input[type="submit"] {
      cursor: url('butterfly-open.png') 24 24, pointer;
    }

    header {
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 1.5vh 4vw;
      flex-shrink: 0;
    }

    .header-logo {
      height: clamp(30px, 5vh, 60px);
      width: auto;
    }

    .albums {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 18vh));
      gap: clamp(8px, 1.2vh, 16px);
      padding: 1vh 0;
      justify-content: center;
      flex: 1;
      align-content: center;
    }

    .album a, .album .coming-soon-wrap {
      display: block;
      width: 100%;
      aspect-ratio: 1;
      overflow: hidden;
      position: relative;
    }

    .album img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      filter: grayscale(1) contrast(1.15);
      opacity: 0.9;
      transition: opacity 0.3s ease, filter 0.3s ease;
    }

    .album a:hover img {
      opacity: 1;
      filter: grayscale(0.4) contrast(1.1);
    }

    .coming-soon-wrap .overlay {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(0, 0, 0, 0.6);
      opacity: 0;
      transition: opacity 0.3s ease;
    }

    .coming-soon-wrap:hover .overlay {
      opacity: 1;
    }

    .coming-soon-wrap:hover img {
      opacity: 1;
      filter: grayscale(0.4) contrast(1.1);
    }

    .overlay span {
      font-weight: 300;
      font-size: clamp(0.65rem, 1.2vw, 0.95rem);
      letter-spacing: 0.2em;
      text-transform: lowercase;
      color: #fff;
    }

    .album-title {
      margin-top: 2px;
      font-size: clamp(0.55rem, 0.9vw, 0.75rem);
      font-weight: 400;
      letter-spacing: 0.05em;
      color: rgba(255, 255, 255, 0.5);
      text-align: center;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    /* Navigation links */
    .nav-links {
      display: flex;
      justify-content: center;
      gap: clamp(20px, 4vw, 48px);
      padding: 0.8vh 4vw 0.5vh;
    }

    .nav-links a {
      color: rgba(255, 255, 255, 0.5);
      text-decoration: none;
      font-size: clamp(0.75rem, 1vw, 0.95rem);
      font-weight: 400;
      letter-spacing: 0.12em;
      text-transform: lowercase;
      transition: color 0.3s ease;
    }

    .nav-links a:hover {
      color: #fff;
    }

    /* Newsletter */
    .newsletter {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 0.5vh 4vw 0.8vh;
    }

    .newsletter-label {
      font-weight: 300;
      font-size: clamp(0.7rem, 1vw, 0.85rem);
      letter-spacing: 0.15em;
      text-transform: lowercase;
      color: rgba(255, 255, 255, 0.4);
      margin-bottom: 4px;
    }

    .newsletter-form {
      display: flex;
      gap: 0;
    }

    .newsletter-form label {
      display: none;
    }

    .newsletter-form p {
      display: none;
    }

    .newsletter-form input[type="email"] {
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-right: none;
      color: #fff;
      padding: 8px 14px;
      font-family: 'Cormorant Garamond', serif;
      font-size: 0.85rem;
      letter-spacing: 0.05em;
      outline: none;
      width: 220px;
      cursor: url('butterfly-closed.png') 24 38, text;
    }

    .newsletter-form input[type="email"]::placeholder {
      color: rgba(255, 255, 255, 0.3);
    }

    .newsletter-form input[type="email"]:focus {
      border-color: rgba(255, 255, 255, 0.5);
      background: rgba(255, 255, 255, 0.12);
    }

    .newsletter-form input[type="submit"] {
      background: rgba(255, 255, 255, 0.1);
      border: 1px solid rgba(255, 255, 255, 0.2);
      color: rgba(255, 255, 255, 0.6);
      padding: 8px 16px;
      font-family: 'Cormorant Garamond', serif;
      font-size: 0.8rem;
      letter-spacing: 0.12em;
      text-transform: lowercase;
      transition: all 0.3s ease;
    }

    .newsletter-form input[type="submit"]:hover {
      background: rgba(255, 255, 255, 0.2);
      color: #fff;
    }

    /* Footer social links */
    footer {
      display: flex;
      justify-content: center;
      gap: clamp(12px, 2.5vw, 32px);
      padding: 0.5vh 4vw 1.5vh;
      flex-shrink: 0;
      flex-wrap: wrap;
    }

    footer a {
      color: rgba(255, 255, 255, 0.5);
      text-decoration: none;
      font-size: clamp(0.65rem, 0.85vw, 0.8rem);
      font-weight: 400;
      letter-spacing: 0.12em;
      text-transform: lowercase;
      transition: color 0.3s ease;
    }

    footer a:hover {
      color: #fff;
    }

    /* Mobile */
    @media (max-width: 600px) {
      header {
        padding: 2vh 5vw;
      }

      .albums {
        grid-template-columns: repeat(2, minmax(0, 22vh));
        gap: 8px;
      }

      .nav-links, footer {
        gap: 14px;
        padding-left: 5vw;
        padding-right: 5vw;
      }

      .newsletter-form input[type="email"] {
        width: 160px;
      }
    }
  </style>
</head>
<body>

  <audio id="hover-sound" src="hover-sound.mp3" preload="auto"></audio>
  <script>
    const sound = document.getElementById('hover-sound');
    document.querySelectorAll('.album').forEach(album => {
      album.addEventListener('mouseenter', () => {
