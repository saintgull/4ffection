<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>4ffection</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      background: #000;
      color: #fff;
      min-height: 100%;
      font-family: 'Cormorant Garamond', serif;
      background-image: url('website%20wallpaper%20retouches.jpg');
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      background-attachment: fixed;
    }

    body {
      display: flex;
      flex-direction: column;
    }

    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 2.5vh 4vw;
      flex-shrink: 0;
    }

    .title {
      font-weight: 300;
      font-size: clamp(1.8rem, 4vw, 3.5rem);
      letter-spacing: 0.15em;
      text-transform: lowercase;
      color: #fff;
    }

    .logo {
      width: clamp(60px, 8vw, 120px);
      height: auto;
    }

    .albums {
      display: grid;
      grid-template-columns: 200px 200px 200px 200px;
      gap: 16px;
      padding: 2vh 0;
      justify-content: center;
    }

    .album a {
      display: block;
      width: 200px;
      height: 200px;
      overflow: hidden;
    }

    .album img {
      width: 200px;
      height: 200px;
      object-fit: cover;
      display: block;
      filter: grayscale(1) contrast(1.15);
      opacity: 0.9;
      transition: opacity 0.3s ease, filter 0.3s ease;
    }

    .album a:hover img {
      opacity: 1;
      filter: grayscale(0.4) contrast(1.1);
    }

    .album-title {
      margin-top: 4px;
      font-size: clamp(0.6rem, 1vw, 0.8rem);
      font-weight: 400;
      letter-spacing: 0.05em;
      color: rgba(255, 255, 255, 0.5);
      text-align: center;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    /* 7 items in 4 cols: center last 3 by offsetting the 5th to col 2 */
    .album:nth-child(5) {
      grid-column-start: 2;
    }

    footer {
      display: flex;
      justify-content: center;
      gap: clamp(20px, 4vw, 48px);
      padding: 2vh 4vw;
      flex-shrink: 0;
    }

    footer a {
      color: rgba(255, 255, 255, 0.5);
      text-decoration: none;
      font-size: clamp(0.75rem, 1vw, 0.95rem);
      font-weight: 400;
      letter-spacing: 0.12em;
      text-transform: lowercase;
      transition: color 0.3s ease;
    }

    footer a:hover {
      color: #fff;
    }

    /* Mobile */
    @media (max-width: 600px) {
      header {
        padding: 2vh 5vw;
      }

      .albums {
        grid-template-columns: 140px 140px;
        gap: 10px;
      }

      .album:nth-child(5) {
        grid-column-start: auto;
      }

      .album a,
      .album img {
        width: 140px;
        height: 140px;
      }

      /* center last item in 2-col layout */
      .album:nth-child(7) {
        grid-column: 1 / -1;
        justify-self: center;
      }

      footer {
        padding: 1.5vh 5vw;
      }
    }
  </style>
</head>
<body>

  <header>
    <span class="title">4ffection</span>
    <img class="logo" src="logo-outline.svg" alt="4ffection logo">
  </header>

  <section class="albums">
    <div class="album">
      <a href="https://soundcloud.com/4ffectionless/sets/synthetic" target="_blank" rel="noopener">
        <img src="SYNTHETIC%20%E2%98%BE%20%E0%BE%80%E0%BD%B2.jpg" alt="SYNTHETIC">
      </a>
      <div class="album-title">SYNTHETIC</div>
    </div>

    <div class="album">
      <a href="https://soundcloud.com/4ffectionless/psychotic-diary-demos" target="_blank" rel="noopener">
        <img src="Psychotic%20Diary%20%28demos%29%20%E2%AA%A9%E0%B7%86%E2%AA%A8%20%E1%B5%89%E1%B5%96%20-%204ffection-artwork.jpg" alt="Psychotic Diary">
      </a>
      <div class="album-title">Psychotic Diary (demos)</div>
    </div>

    <div class="album">
      <a href="https://soundcloud.com/4ffectionless/sets/stjarna" target="_blank" rel="noopener">
        <img src="stj%C3%A4rna%20%E2%98%86._%E2%82%8A%E2%80%A7%E2%81%BA%CB%96%E2%8B%86%E2%82%8A%CB%9A%CA%9A.jpg" alt="stjärna">
      </a>
      <div class="album-title">stjärna</div>
    </div>

    <div class="album">
      <a href="https://soundcloud.com/4ffectionless/sets/551b498c-c0ab-4f9d-96f2-71546d36bf21" target="_blank" rel="noopener">
        <img src="All%20flesh%20rots%2C%20%EA%92%B0%E0%A6%8C%E2%99%A1.jpg" alt="All flesh rots,">
      </a>
      <div class="album-title">All flesh rots,</div>
    </div>

    <div class="album">
      <a href="https://soundcloud.com/4ffectionless/sets/limerence" target="_blank" rel="noopener">
        <img src="limerence%20%E2%99%A1%20%28prod.%20AQUILOTTO%29.jpg" alt="limerence">
      </a>
      <div class="album-title">limerence</div>
    </div>

    <div class="album">
      <a href="https://soundcloud.com/4ffectionless/sets/a-tender-kind-of-insanity" target="_blank" rel="noopener">
        <img src="a%20tender%20kind%20of%20insanity.jpg" alt="a tender kind of insanity">
      </a>
      <div class="album-title">a tender kind of insanity</div>
    </div>

    <div class="album">
      <a href="https://soundcloud.com/4ffectionless/sets/la-pluie-cessera-quand-tu-souriras-a-nouveau-prod-vanda" target="_blank" rel="noopener">
        <img src="la%20pluie%20cessera%20quand%20tu%20souriras%20%C3%A0%20nouveau%20%28prod.%20v%C3%A5nda%29.jpg" alt="la pluie cessera">
      </a>
      <div class="album-title">la pluie cessera quand tu souriras à nouveau</div>
    </div>
  </section>

  <footer>
    <a href="https://x.com/eversince222" target="_blank" rel="noopener">twitter</a>
    <a href="https://soundcloud.com/4ffectionless" target="_blank" rel="noopener">soundcloud</a>
    <a href="https://www.instagram.com/_4ffection/" target="_blank" rel="noopener">instagram</a>
  </footer>

</body>
</html>
